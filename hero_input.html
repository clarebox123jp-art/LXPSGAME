<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦸 LXPSGAME 英雄編輯器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f3ee; --bg-card:#ffffff; --bg-soft:#faf9f5;
  --border:#d8d4c8; --border-soft:#e6e2d6;
  --text:#2c2a26; --text-soft:#6e6a60; --text-muted:#9b968a;
  --primary:#6f5fd6; --primary-soft:#ece9fb; --primary-text:#3c2f9c;
  --info:#2d70c4; --info-soft:#e1edfa; --info-text:#1c4985;
  --success:#2d8866; --success-soft:#ddf1e8; --success-text:#15583e;
  --warning:#c47a14; --warning-soft:#fcecd2; --warning-text:#6f4304;
  --danger:#c4382c; --danger-soft:#fbe3df; --danger-text:#832217;
  --ai:#8a4caa; --ai-soft:#f3e9f9;
  --modified:#fff7d8; --modified-border:#e6c945;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;min-height:100vh;}
input,select,textarea,button{font-family:inherit;font-size:inherit;color:inherit;}
input[type=text],input[type=number],select,textarea{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);transition:border-color .12s,box-shadow .12s;}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
textarea{resize:vertical;min-height:60px;line-height:1.6;}
input.modified,select.modified,textarea.modified{background:var(--modified);border-color:var(--modified-border);}
button{border:1px solid var(--border);background:var(--bg-card);padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .12s;}
button:hover{background:var(--bg-soft);border-color:var(--text-soft);}
button:active{transform:scale(.98);}
button:disabled{opacity:.5;cursor:not-allowed;}
button.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
button.primary:hover:not(:disabled){background:#5a4cc4;}
button.danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.app{max-width:1280px;margin:0 auto;padding:16px;}
header.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;flex-wrap:wrap;gap:12px;}
.app-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;}
.app-title .badge{font-size:11px;padding:3px 8px;background:var(--primary-soft);color:var(--primary-text);border-radius:4px;font-weight:500;}
.mode-tabs{display:flex;gap:6px;background:var(--bg-soft);padding:4px;border-radius:8px;}
.mode-tabs button{background:transparent;border:none;padding:7px 16px;font-size:13px;font-weight:500;color:var(--text-soft);border-radius:6px;}
.mode-tabs button.active{background:var(--bg-card);color:var(--primary-text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.actions{display:flex;gap:8px;}
.actions button{font-size:13px;padding:8px 14px;}
.main-area{display:grid;grid-template-columns:220px 1fr;gap:12px;margin-bottom:12px;}
@media (max-width:768px){.main-area{grid-template-columns:1fr;}}
aside.sidebar{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px;height:fit-content;position:sticky;top:16px;}
.sidebar h3{font-size:12px;color:var(--text-soft);letter-spacing:.5px;margin-bottom:8px;padding-left:4px;font-weight:500;}
.hero-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.hero-item{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:8px;padding:8px 10px;cursor:pointer;position:relative;transition:all .12s;}
.hero-item:hover{border-color:var(--border);background:var(--bg-card);}
.hero-item.active{border:2px solid var(--primary);background:var(--bg-card);padding:7px 9px;}
.hero-item-row{display:flex;align-items:center;justify-content:space-between;}
.hero-item-name{font-size:13px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:140px;}
.hero-item-status{font-size:11px;margin-top:2px;}
.hero-item-status.editing{color:var(--info-text);}
.hero-item-status.complete{color:var(--success-text);}
.hero-item-status.draft{color:var(--warning-text);}
.hero-item-status.modified{color:var(--warning-text);}
.hero-item-remove{background:transparent;border:none;color:var(--text-muted);font-size:14px;padding:0 4px;cursor:pointer;line-height:1;}
.hero-item-remove:hover{color:var(--danger);background:transparent;border-color:transparent;}
.add-btn-bar{display:flex;flex-direction:column;gap:6px;}
.add-btn-bar button{width:100%;font-size:12px;padding:8px;}
.warnings{margin-top:12px;padding:8px 10px;background:var(--warning-soft);border-radius:6px;font-size:11px;color:var(--warning-text);line-height:1.5;}
.warnings.hidden{display:none;}
.picker-area{background:var(--info-soft);border-radius:8px;padding:10px;margin-bottom:8px;}
.picker-area label{font-size:11px;color:var(--info-text);display:block;margin-bottom:4px;font-weight:500;}
.picker-area select{font-size:12px;}
main.editor{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;min-height:600px;}
.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;text-align:center;color:var(--text-muted);}
.editor-empty .icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.editor-empty .hint{font-size:13px;max-width:320px;line-height:1.7;}
.editor-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid var(--border-soft);margin-bottom:14px;flex-wrap:wrap;gap:6px;}
.editor-title{font-size:15px;font-weight:600;}
.editor-title .emoji{margin-right:6px;}
.editor-subtitle{font-size:12px;color:var(--text-soft);font-weight:400;}
.section{background:var(--bg-soft);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.section-header{padding:10px 14px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;transition:background .12s;}
.section-header:hover{background:var(--border-soft);}
.section-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;}
.section-title .arrow{transition:transform .2s;font-size:10px;color:var(--text-muted);}
.section.expanded .arrow{transform:rotate(90deg);}
.section-summary{font-size:11px;color:var(--text-muted);}
.section-summary.success{color:var(--success-text);}
.section-summary.warning{color:var(--warning-text);}
.section-summary.danger{color:var(--danger-text);}
.section-summary.ai{color:var(--ai);}
.section-summary.info{color:var(--info-text);}
.section-body{padding:12px 14px 14px;display:none;border-top:1px solid var(--border-soft);background:var(--bg-card);}
.section.expanded .section-body{display:block;}
.field-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.field-grid.three{grid-template-columns:repeat(3,1fr);}
.field-grid.four{grid-template-columns:repeat(4,1fr);}
.field-grid > .full{grid-column:1 / -1;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;color:var(--text-soft);}
.field label .required{color:var(--danger);margin-left:2px;}
.balance-hint{margin-top:8px;padding:6px 10px;background:var(--bg-soft);border-radius:6px;font-size:11px;display:flex;justify-content:space-between;color:var(--text-soft);}
select.ai-default{background:var(--ai-soft);color:var(--ai);font-weight:500;}
.help{font-size:11px;color:var(--text-muted);margin-top:2px;}
.output-area{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-top:12px;}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.output-title{font-size:13px;font-weight:600;}
.output-empty{font-size:13px;color:var(--text-muted);padding:30px 20px;text-align:center;background:var(--bg-soft);border-radius:8px;}
.output-pre{background:#2c2a26;color:#f0ebe0;font-family:"SF Mono",Monaco,"Cascadia Mono","Consolas",monospace;font-size:12px;line-height:1.6;padding:14px 16px;border-radius:6px;white-space:pre;overflow-x:auto;max-height:500px;overflow-y:auto;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.success{background:var(--success);}
.toast.danger{background:var(--danger);}
.help-block{background:var(--info-soft);border-left:3px solid var(--info);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--info-text);margin-bottom:12px;line-height:1.6;}
.modified-indicator{display:inline-block;font-size:10px;padding:1px 6px;background:var(--modified-border);color:#6f4304;border-radius:3px;margin-left:6px;font-weight:500;}
.field-orig{font-size:10px;color:var(--text-muted);margin-top:2px;font-style:italic;}
</style>
</head>
<body>

<div class="app">

<header class="app-header">
  <div class="app-title">
    <span style="font-size:22px;">🦸</span>
    <span>LXPSGAME 英雄編輯器</span>
    <span class="badge" id="version-badge">v1.0</span>
  </div>
  <div class="mode-tabs">
    <button id="tab-add" class="active" onclick="switchMode('add')">🆕 新增英雄</button>
    <button id="tab-edit" onclick="switchMode('edit')">⚖ 修改現有英雄(平衡調整)</button>
  </div>
  <div class="actions">
    <button onclick="clearAll()" title="清空目前所有編輯,從頭開始">🗑 全部清空</button>
    <button class="primary" onclick="generateOutput()">📋 產生<span id="output-btn-label">設計單</span></button>
  </div>
</header>

<div class="main-area">
  <aside class="sidebar">
    <div id="picker-area" style="display:none;">
      <div class="picker-area">
        <label>選一隻現有英雄來修改:</label>
        <select id="hero-picker" onchange="onPickerChange()">
          <option value="">— 選擇英雄 —</option>
        </select>
      </div>
    </div>

    <h3 id="sidebar-title">英雄清單 (0)</h3>
    <div class="hero-list" id="hero-list"></div>

    <div class="add-btn-bar">
      <button id="add-btn" onclick="addNewHero()">➕ 新增英雄</button>
    </div>

    <div class="warnings hidden" id="warnings"></div>
  </aside>

  <main class="editor" id="editor">
    <div class="editor-empty" id="editor-empty">
      <div class="icon">🦸</div>
      <div class="hint" id="empty-hint">
        左邊點「➕ 新增英雄」開始填寫第一隻新角色資料,<br>
        或切換到右上「⚖ 修改現有英雄」來調整平衡。
      </div>
    </div>
    <div id="editor-form" style="display:none;"></div>
  </main>
</div>

<div class="output-area">
  <div class="output-header">
    <div class="output-title">📋 <span id="output-title-text">設計單預覽</span></div>
    <div>
      <button onclick="copyOutput()" id="copy-btn" disabled>📑 複製到剪貼簿</button>
    </div>
  </div>
  <div id="output-content">
    <div class="output-empty">填完上方表單後,按右上「📋 產生設計單」這裡就會出現可複製的內容</div>
  </div>
</div>

</div>

<div id="toast" class="toast"></div>

const STORAGE_KEY = 'lxps_hero_editor_v1';

const state = {
  mode: 'add',          // 'add' or 'edit'
  heroes: [],           // [{ id, name, ...所有欄位 }, ...]
  activeIdx: 0,
};

// 從 localStorage 還原
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed && typeof parsed === 'object') {
      Object.assign(state, parsed);
    }
  }
} catch(e) { console.warn('還原失敗', e); }

// 自動儲存(防抖)
let saveTimer = null;
function autoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }, 600);
}

    designerName: '',
    designerEmail: '',

    atk: 11,
    sp: 8,
    spd: 10,
    // 介紹

    bioRole: '',
    bioTrait: '',
    bioHobby: '',
    bioQuote: '',

    traitDesc: '',
    traitFd: '',

    burstFd: '',

// 從現有快照建立 hero(用於 edit mode)
function fromSnapshot(name) {
  const s = HEROES_DB[name];
  if (!s) return null;
  const h = emptyHero({ sourceMode: 'edit', sourceName: name });
  h.name = name;
  h.emoji = s.emoji || '';
  h.img = s.img || '';
  h.hp = s.hp || 0;
  h.atk = s.atk || 0;
  h.sp = s.sp || 0;
  h.spd = s.spd || 0;
  h.lore = s.lore || '';
  if (s.bio) {
    h.bioRole = s.bio.role || '';
    h.bioTrait = s.bio.trait || '';
    h.bioHobby = s.bio.hobby || '';
    h.bioQuote = s.bio.quote || '';
    if (s.bio.designer) {
      h.designerClass = s.bio.designer.class || '';
      h.designerName = s.bio.designer.name || '';
      h.designerYear = s.bio.designer.year || 2026;
    }
  }
  if (s.trait) {
    h.traitName = s.trait.name || '';
    h.traitIcon = s.trait.icon || '';
    h.traitDesc = s.trait.desc || '';
    h.traitFd = s.trait.fd || '';
  }
  if (s.s1) {
    h.s1Name = s.s1.n || '';
    h.s1Cost = s.s1.c || 3;
    h.s1D = s.s1.d || '';
    h.s1Fd = s.s1.fd || '';
  }
  if (s.s2) {
    h.s2Name = s.s2.n || '';
    h.s2Cost = s.s2.c || 3;
    h.s2D = s.s2.d || '';
    h.s2Fd = s.s2.fd || '';
  }
  if (s.burst) {
    h.burstName = s.burst.n || '';
    h.burstD = s.burst.d || '';
    h.burstFd = s.burst.fd || '';
  }
  return h;
}

// 計算英雄填寫完成度 0~100
function completion(h) {
  let total = 0, filled = 0;
  // 真正必填的 5 個欄位
  const trulyRequired = ['name','img','designerClass','designerName','designerEmail'];
  for (const f of trulyRequired) {
    total++;
    if (h[f] && String(h[f]).trim()) filled++;
  }
  // 每個技能至少要有 1 個線索
  const skillHints = [
    ['天賦', [h.traitDesc, h.traitFd, h.traitTrigger !== TRIGGER_TYPES[0] ? '1' : '']],
    ['S1', [h.s1D, h.s1Fd, h.s1EffectType !== EFFECT_TYPES[0] ? '1' : '', h.s1Formula]],
    ['S2', [h.s2D, h.s2Fd, h.s2EffectType !== EFFECT_TYPES[0] ? '1' : '', h.s2Formula]],
    ['爆發', [h.burstD, h.burstFd, h.burstFormula, (h.burstExtras||[]).length ? '1' : '']],
  ];
  skillHints.forEach(([_, hints]) => {
    total++;
    if (hints.some(v => v && String(v).trim())) filled++;
  });
  return Math.round(filled / total * 100);
}

// 取得未填的「真正必填欄位」列表(用於送出前提示)
function getMissingRequired(h) {
  const missing = [];
  const map = {
    name: '角色名稱', img: '圖片檔名',
    designerClass: '設計者班級', designerName: '設計者姓名', designerEmail: '登入 email'
  };
  for (const [f, lab] of Object.entries(map)) {
    if (!h[f] || !String(h[f]).trim()) missing.push(lab);
  }
  // 技能線索
  if (!h.traitDesc && !h.traitFd && h.traitTrigger === TRIGGER_TYPES[0]) missing.push('天賦(至少給 1 個線索)');
  if (!h.s1D && !h.s1Fd && h.s1EffectType === EFFECT_TYPES[0] && !h.s1Formula) missing.push('S1(至少給 1 個線索)');
  if (!h.s2D && !h.s2Fd && h.s2EffectType === EFFECT_TYPES[0] && !h.s2Formula) missing.push('S2(至少給 1 個線索)');
  if (!h.burstD && !h.burstFd && !h.burstFormula && !(h.burstExtras||[]).length) missing.push('爆發(至少給 1 個線索)');
  return missing;
}

// 計算修改數量(只在 edit mode 用)
function modifiedCount(h) {
  if (h.sourceMode !== 'edit' || !h.sourceName) return 0;
  const orig = HEROES_DB[h.sourceName];
  if (!orig) return 0;
  let n = 0;
  if (h.hp !== orig.hp) n++;
  if (h.atk !== orig.atk) n++;
  if (h.sp !== orig.sp) n++;
  if (h.spd !== orig.spd) n++;
  if (h.lore !== (orig.lore||'')) n++;
  if (h.bioRole !== (orig.bio?.role||'')) n++;
  if (h.bioTrait !== (orig.bio?.trait||'')) n++;
  if (h.bioHobby !== (orig.bio?.hobby||'')) n++;
  if (h.bioQuote !== (orig.bio?.quote||'')) n++;
  if (h.traitName !== (orig.trait?.name||'')) n++;
  if (h.traitDesc !== (orig.trait?.desc||'')) n++;
  if (h.traitFd !== (orig.trait?.fd||'')) n++;
  if (h.s1Name !== (orig.s1?.n||'')) n++;
  if (h.s1Cost !== (orig.s1?.c||3)) n++;
  if (h.s1D !== (orig.s1?.d||'')) n++;
  if (h.s1Fd !== (orig.s1?.fd||'')) n++;
  if (h.s2Name !== (orig.s2?.n||'')) n++;
  if (h.s2Cost !== (orig.s2?.c||3)) n++;
  if (h.s2D !== (orig.s2?.d||'')) n++;
  if (h.s2Fd !== (orig.s2?.fd||'')) n++;
  if (h.burstName !== (orig.burst?.n||'')) n++;
  if (h.burstD !== (orig.burst?.d||'')) n++;
  if (h.burstFd !== (orig.burst?.fd||'')) n++;
  return n;
}

// Toast 提示
// ════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ════════════════════════════════════════════════════
// 模式切換
// ════════════════════════════════════════════════════
function switchMode(m) {
  if (state.mode === m) return;
  // 確認:有未匯出的內容?(簡化處理:直接切)
  state.mode = m;
  state.heroes = [];
  state.activeIdx = 0;
  document.getElementById('tab-add').classList.toggle('active', m === 'add');
  document.getElementById('tab-edit').classList.toggle('active', m === 'edit');
  document.getElementById('output-btn-label').textContent = m === 'add' ? '設計單' : '平衡調整單';
  document.getElementById('output-title-text').textContent = m === 'add' ? '設計單預覽' : '平衡調整單預覽';
  document.getElementById('picker-area').style.display = m === 'edit' ? 'block' : 'none';
  document.getElementById('add-btn').style.display = m === 'add' ? 'block' : 'none';
  document.getElementById('empty-hint').innerHTML = m === 'add'
    ? '左邊點「➕ 新增英雄」開始填寫第一隻新角色資料,<br>填完按右上「📋 產生設計單」匯出'
    : '左上方下拉選單挑一隻現有英雄,<br>它的當前能力會自動填入表單,<br>修改後按右上「📋 產生平衡調整單」匯出有改動的部分';
  // 清空 output
  document.getElementById('output-content').innerHTML = '<div class="output-empty">填完上方表單後,按右上「📋 產生' + (m === 'add' ? '設計單' : '平衡調整單') + '」這裡就會出現可複製的內容</div>';
  document.getElementById('copy-btn').disabled = true;
  // 重新填 picker(edit mode)
  populateHeroPicker();
  render();
  autoSave();
}

function populateHeroPicker() {
  const sel = document.getElementById('hero-picker');
  sel.innerHTML = '<option value="">— 選擇英雄 —</option>';
  const names = Object.keys(HEROES_DB).sort();
  for (const n of names) {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = (HEROES_DB[n].emoji || '') + ' ' + n;
    sel.appendChild(opt);
  }
}

function onPickerChange() {
  const sel = document.getElementById('hero-picker');
  const name = sel.value;
  sel.value = '';  // 清回選擇
  if (!name) return;
  loadExistingHero(name);
}

function loadExistingHero(name) {
  // 檢查是否已在編輯
  const exists = state.heroes.find(h => h.sourceName === name);
  if (exists) {
    showToast(`「${name}」已在編輯清單中`, 'danger');
    return;
  }
  const h = fromSnapshot(name);
  if (!h) {
    showToast('找不到該英雄資料', 'danger');
    return;
  }
  state.heroes.push(h);
  state.activeIdx = state.heroes.length - 1;
  render();
  autoSave();
  showToast(`已載入「${name}」現有資料`, 'success');
}

function addNewHero() {
  const h = emptyHero({ sourceMode: 'add' });
  state.heroes.push(h);
  state.activeIdx = state.heroes.length - 1;
  render();
  autoSave();
}

function clearAll() {
  if (state.heroes.length === 0) {
    showToast('沒有可清空的內容', 'danger');
    return;
  }
  if (!confirm(`確定要清空所有 ${state.heroes.length} 隻英雄的編輯內容?此動作無法回復。`)) return;
  state.heroes = [];
  state.activeIdx = 0;
  document.getElementById('output-content').innerHTML = '<div class="output-empty">填完上方表單後,按右上「📋 產生' + (state.mode === 'add' ? '設計單' : '平衡調整單') + '」這裡就會出現可複製的內容</div>';
  document.getElementById('copy-btn').disabled = true;
  render();
  autoSave();
  showToast('已清空', 'success');
}

function selectHero(idx) {
  state.activeIdx = idx;
  render();
}

function removeHero(idx, ev) {
  ev && ev.stopPropagation();
  const h = state.heroes[idx];
  const name = h.name || (h.sourceName ? `修改中:${h.sourceName}` : '未命名');
  if (!confirm(`確定移除「${name}」的編輯?`)) return;
  state.heroes.splice(idx, 1);
  if (state.activeIdx >= state.heroes.length) state.activeIdx = state.heroes.length - 1;
  render();
  autoSave();
}

// ════════════════════════════════════════════════════
// 即時更新欄位
// ════════════════════════════════════════════════════
function updateField(idx, field, value) {
  const h = state.heroes[idx];
  if (!h) return;
  h[field] = value;
  // 即時更新 sidebar 名稱與完成度
  updateSidebar();
  // 即時更新 modified 樣式(edit mode)
  if (h.sourceMode === 'edit') updateModifiedStyles();
  // 即時更新平衡指示
  updateBalanceHints();
  // 即時更新 section summary
  updateSectionSummaries();
  autoSave();
}

function updateCheckboxField(idx, field, value, checked) {
  const h = state.heroes[idx];
  if (!h) return;
  if (!Array.isArray(h[field])) h[field] = [];
  if (checked) {
    if (!h[field].includes(value)) h[field].push(value);
  } else {
    h[field] = h[field].filter(v => v !== value);
  }
  if (h.sourceMode === 'edit') updateModifiedStyles();
  autoSave();
}

// ════════════════════════════════════════════════════
// 渲染主流程
// ════════════════════════════════════════════════════
function render() {
  updateSidebar();
  renderEditor();
}

function updateSidebar() {
  const list = document.getElementById('hero-list');
  list.innerHTML = '';
  document.getElementById('sidebar-title').textContent = (state.mode === 'add' ? '新增清單' : '修改清單') + ' (' + state.heroes.length + ')';

  state.heroes.forEach((h, idx) => {
    const item = document.createElement('div');
    item.className = 'hero-item' + (idx === state.activeIdx ? ' active' : '');
    item.onclick = () => selectHero(idx);

    const row = document.createElement('div');
    row.className = 'hero-item-row';

    const nameSpan = document.createElement('div');
    nameSpan.className = 'hero-item-name';
    if (h.sourceMode === 'edit') {
      nameSpan.textContent = (h.emoji || '') + ' ' + (h.name || h.sourceName);
    } else {
      nameSpan.textContent = (h.emoji || '🦸') + ' ' + (h.name || '未命名');
    }

    const removeBtn = document.createElement('button');
    removeBtn.className = 'hero-item-remove';
    removeBtn.textContent = '✕';
    removeBtn.title = '移除';
    removeBtn.onclick = (ev) => removeHero(idx, ev);

    row.appendChild(nameSpan);
    row.appendChild(removeBtn);
    item.appendChild(row);

    const status = document.createElement('div');
    status.className = 'hero-item-status';
    if (h.sourceMode === 'edit') {
      const mc = modifiedCount(h);
      if (mc === 0) {
        status.classList.add('editing');
        status.textContent = '原樣未動';
      } else {
        status.classList.add('modified');
        status.textContent = '已改 ' + mc + ' 處';
      }
    } else {
      const c = completion(h);
      if (idx === state.activeIdx) {
        status.classList.add('editing');
        status.textContent = '編輯中・' + c + '%';
      } else if (c >= 95) {
        status.classList.add('complete');
        status.textContent = '已完成・' + c + '%';
      } else if (c >= 50) {
        status.classList.add('editing');
        status.textContent = '進行中・' + c + '%';
      } else {
        status.classList.add('draft');
        status.textContent = '草稿・' + c + '%';
      }
    }
    item.appendChild(status);
    list.appendChild(item);
  });

  // 警告
  updateWarnings();
}

function updateWarnings() {
  const w = document.getElementById('warnings');
  const issues = [];

  // 檢查 email 衝突(只 add mode)
  if (state.mode === 'add') {
    const seenEmails = {};
    state.heroes.forEach((h, idx) => {
      const email = (h.designerEmail || '').trim();
      if (!email) return;
      if (EXISTING_DESIGNERS[email]) {
        issues.push(`「${h.name || '未命名'}」的 email 跟既有玩家衝突(${EXISTING_DESIGNERS[email]})`);
      }
      if (seenEmails[email]) {
        issues.push(`email「${email}」在這次批次中重複`);
      }
      seenEmails[email] = true;
    });
    // 名稱衝突 vs 既有英雄
    state.heroes.forEach(h => {
      if (h.name && HEROES_DB[h.name]) {
        issues.push(`英雄名「${h.name}」已存在`);
      }
    });
    // 名稱在批次內重複
    const seenNames = {};
    state.heroes.forEach(h => {
      const n = (h.name || '').trim();
      if (!n) return;
      if (seenNames[n]) issues.push(`英雄名「${n}」在批次中重複`);
      seenNames[n] = true;
    });
  }

  if (issues.length === 0) {
    w.classList.add('hidden');
  } else {
    w.classList.remove('hidden');
    w.innerHTML = '⚠️ ' + issues.map(i => '<div style="margin-top:3px">' + i + '</div>').join('');
  }
}


// ════════════════════════════════════════════════════
// 表單渲染 - 11 個區塊

// 渲染單一英雄編輯表單
function renderEditor() {
  const editorEmpty = document.getElementById('editor-empty');
  const editorForm = document.getElementById('editor-form');

  if (state.heroes.length === 0) {
    editorEmpty.style.display = 'flex';
    editorForm.style.display = 'none';
    return;
  }

  editorEmpty.style.display = 'none';
  editorForm.style.display = 'block';

  const h = state.heroes[state.activeIdx];
  if (!h) return;
  const idx = state.activeIdx;
  const isEdit = h.sourceMode === 'edit';
  const orig = isEdit && h.sourceName ? HEROES_DB[h.sourceName] : null;

  editorForm.innerHTML = `
    <div class="editor-header">
      <div>
        <span class="editor-title">
          <span class="emoji">${h.emoji || '🦸'}</span>
          ${isEdit ? `修改:${h.name || h.sourceName}` : (h.name || '新英雄(未命名)')}
        </span>
        <span class="editor-subtitle">${isEdit ? '黃色背景的欄位 = 已被你改過' : '11 個區段,展開後填寫,支援多隻批次'}</span>
      </div>
    </div>

    ${isEdit ? `<div class="help-block">⚖ <b>平衡調整模式</b> — 你只需要改要動的欄位,沒改的會保持原樣不顯示。提交後我只會應用「已修改」的部分。</div>` : `<div class="help-block">
      💡 <b>必填的只有 5 個欄位</b>(基本資料區的 角色名 / 圖片檔名 / 班級 / 姓名 / email)— 都是學生本人才知道的真實資訊。<br>
      其他標 <span style="color:var(--ai);font-weight:500;">💭</span> 的欄位 <b>空白都可以</b>,我會根據角色概念幫你想。<br>
      唯一例外:<b>每個技能(天賦/S1/S2/爆發)請至少給我 1 個線索</b>(短描述、完整描述、效果類型 任一個),不然我猜不到效果是什麼。
    </div>`}

    ${section(1, '🪪 基本資料', renderBasicSection(h, idx, orig))}
    ${section(2, '💪 基礎能力', renderStatsSection(h, idx, orig))}
    ${section(3, '📖 角色介紹(英雄圖鑑顯示)', renderIntroSection(h, idx, orig))}
    ${section(4, '⭐ 天賦(被動效果)', renderTraitSection(h, idx, orig))}
    ${section(5, '⚔ 技能 1(主動)', renderSkillSection(h, idx, orig, 's1'))}
    ${section(6, '⚔ 技能 2(主動)', renderSkillSection(h, idx, orig, 's2'))}
    ${section(7, '💥 爆發技', renderBurstSection(h, idx, orig))}
    ${section(8, '🎯 雷達圖六維', renderRadarSection(h, idx, orig))}
    ${section(9, '🖼 圖片顯示調整(可空)', renderImagePosSection(h, idx, orig))}
    ${section(10, '🎲 召喚池與稀有度', renderSummonSection(h, idx, orig))}
    ${section(11, '📝 特殊備註(自由欄)', renderNotesSection(h, idx, orig))}
  `;

  // 把原本展開的區段重新展開(基本/能力/介紹/天賦)
  const expandDefault = ['1','2','3','4'];
  expandDefault.forEach(n => {
    const sec = document.querySelector('.section[data-num="' + n + '"]');
    if (sec) sec.classList.add('expanded');
  });

  // 即時更新樣式
  if (isEdit) updateModifiedStyles();
  updateBalanceHints();
  updateSectionSummaries();
}

// 區段包裝器
function section(num, title, body) {
  return `
    <div class="section" data-num="${num}">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">
          <span class="arrow">▶</span>
          <span>${num}. ${title}</span>
        </div>
        <div class="section-summary" data-section-num="${num}"></div>
      </div>
      <div class="section-body">${body}</div>
    </div>
  `;
}

function toggleSection(header) {
  const sec = header.parentElement;
  sec.classList.toggle('expanded');
}

// 欄位 helper
function fieldText(label, idx, field, value, opts) {
  opts = opts || {};
  const required = opts.required ? '<span class="required">*</span>' : '';
  const isTextarea = opts.textarea;
  const ph = opts.placeholder ? ` placeholder="${esc(opts.placeholder)}"` : '';
  const safeVal = esc(value || '');
  const ctrl = isTextarea
    ? `<textarea data-field="${field}" data-idx="${idx}" oninput="updateField(${idx},'${field}',this.value)"${ph}>${safeVal}</textarea>`
    : `<input type="text" data-field="${field}" data-idx="${idx}" value="${safeVal}" oninput="updateField(${idx},'${field}',this.value)"${ph}>`;
  return `
    <div class="field">
      <label>${label}${required}</label>
      ${ctrl}
      ${opts.help ? `<div class="help">${opts.help}</div>` : ''}
    </div>`;
}

function fieldNum(label, idx, field, value, opts) {
  opts = opts || {};
  const required = opts.required ? '<span class="required">*</span>' : '';
  const min = opts.min !== undefined ? ` min="${opts.min}"` : '';
  const max = opts.max !== undefined ? ` max="${opts.max}"` : '';
  return `
    <div class="field">
      <label>${label}${required}</label>
      <input type="number" data-field="${field}" data-idx="${idx}" value="${value !== undefined && value !== null ? value : ''}"${min}${max} oninput="updateField(${idx},'${field}',this.value === '' ? '' : Number(this.value))">
    </div>`;
}

function fieldSelect(label, idx, field, value, options, opts) {
  opts = opts || {};
  const required = opts.required ? '<span class="required">*</span>' : '';
  const opts_html = options.map(o => {
    const v = typeof o === 'object' ? o.value : o;
    const lab = typeof o === 'object' ? o.label : o;
    return `<option value="${esc(v)}"${v === value ? ' selected' : ''}>${esc(lab)}</option>`;
  }).join('');
  // 若選擇值是「🤖」開頭,套 ai-default 樣式
  const aiClass = String(value || '').startsWith('🤖') ? ' class="ai-default"' : '';
  return `
    <div class="field">
      <label>${label}${required}</label>
      <select data-field="${field}" data-idx="${idx}"${aiClass} onchange="updateField(${idx},'${field}',this.value);renderEditor();">${opts_html}</select>
    </div>`;
}

function fieldCheckboxList(label, idx, field, values, options) {
  values = values || [];
  const items = options.map(o => {
    const checked = values.includes(o) ? 'checked' : '';
    return `<label style="display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-right:10px;margin-bottom:3px;cursor:pointer;font-weight:400;">
      <input type="checkbox" ${checked} data-field="${field}" data-idx="${idx}" onchange="updateCheckboxField(${idx},'${field}','${esc(o)}',this.checked)">
      <span>${esc(o)}</span>
    </label>`;
  }).join('');
  return `
    <div class="field">
      <label>${label}</label>
      <div style="margin-top:2px;">${items}</div>
    </div>`;
}

function fieldOriginalNote(orig_value, fieldLabel) {
  if (orig_value === undefined || orig_value === null || orig_value === '') return '';
  const display = String(orig_value).length > 80 ? String(orig_value).slice(0, 80) + '...' : orig_value;
  return `<div class="field-orig">原值:${esc(display)}</div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function updateModifiedStyles() {
  const h = state.heroes[state.activeIdx];
  if (!h || h.sourceMode !== 'edit') return;
  const orig = HEROES_DB[h.sourceName];
  if (!orig) return;

  const compareMap = [
    ['hp', orig.hp],
    ['atk', orig.atk],
    ['sp', orig.sp],
    ['spd', orig.spd],
    ['lore', orig.lore || ''],
    ['bioRole', orig.bio?.role || ''],
    ['bioTrait', orig.bio?.trait || ''],
    ['bioHobby', orig.bio?.hobby || ''],
    ['bioQuote', orig.bio?.quote || ''],
    ['traitName', orig.trait?.name || ''],
    ['traitIcon', orig.trait?.icon || ''],
    ['traitDesc', orig.trait?.desc || ''],
    ['traitFd', orig.trait?.fd || ''],
    ['s1Name', orig.s1?.n || ''],
    ['s1Cost', orig.s1?.c || 3],
    ['s1D', orig.s1?.d || ''],
    ['s1Fd', orig.s1?.fd || ''],
    ['s2Name', orig.s2?.n || ''],
    ['s2Cost', orig.s2?.c || 3],
    ['s2D', orig.s2?.d || ''],
    ['s2Fd', orig.s2?.fd || ''],
    ['burstName', orig.burst?.n || ''],
    ['burstD', orig.burst?.d || ''],
    ['burstFd', orig.burst?.fd || ''],
  ];

  for (const [field, origVal] of compareMap) {
    const el = document.querySelector(`[data-field="${field}"][data-idx="${state.activeIdx}"]`);
    if (!el) continue;
    const cur = h[field];
    const changed = (cur !== origVal) && !(cur === '' && (origVal === '' || origVal === undefined));
    el.classList.toggle('modified', !!changed);
  }
}

    1: h.name ? (h.designerClass ? `${h.designerClass} ${h.designerName}・${h.designerYear}` : (h.sourceMode === 'edit' ? '修改現有英雄' : '未填設計者')) : '未命名',
    2: ((h.hp||0)+(h.atk||0)+(h.sp||0)+(h.spd||0)) + ' 點',
    3: h.lore ? '✓ 已填 ' + ([h.bioRole, h.bioTrait, h.bioHobby, h.bioQuote].filter(Boolean).length) + '/4' : '尚未填寫',
    4: h.traitName || '尚未填寫',
    5: h.s1Name ? `${h.s1Name}・能量 ${h.s1Cost}` : '尚未填寫',
    6: h.s2Name ? `${h.s2Name}・能量 ${h.s2Cost}` : '尚未填寫',
    7: h.burstName ? h.burstName + (h.burstGifSrc?.startsWith('🤖') ? '・🤖 GIF' : '') : '尚未填寫',
    8: h.radarAi ? '🤖 全部由 AI 決定' : `總和 ${(h.radarAtk||0)+(h.radarSpd||0)+(h.radarDef||0)+(h.radarSup||0)+(h.radarCtrl||0)+(h.radarSkill||0)}`,
    9: h.imgPosAi ? '🤖 全部由 AI 決定' : (h.thumbPos || h.imgPos ? '✓ 手動設定' : '🤖 預設'),
    10: h.inSummon ? '✓ 加入稀有池' : '✗ 不加入',
    11: h.notes ? '有備註' : '(無)',
  };

  Object.entries(summaries).forEach(([num, text]) => {
    const el = document.querySelector(`[data-section-num="${num}"]`);
    if (!el) return;
    el.textContent = text;
    el.className = 'section-summary' + (text.startsWith('🤖') ? ' ai' : text.startsWith('✓') ? ' success' : text.includes('未') || text.includes('未填') ? '' : '');
  });
}


// ════════════════════════════════════════════════════
// 產生輸出
// ════════════════════════════════════════════════════

function generateOutput() {
  if (state.heroes.length === 0) {
    showToast('還沒有任何英雄資料,請先「➕ 新增英雄」或「選現有英雄修改」', 'danger');
    return;
  }

  const out = state.mode === 'add' ? generateAddOutput() : generateEditOutput();
  if (!out) return;

  document.getElementById('output-content').innerHTML = '<pre class="output-pre">' + esc(out) + '</pre>';
  document.getElementById('copy-btn').disabled = false;
  showToast('✓ 設計單已產生,可按右上「📑 複製到剪貼簿」', 'success');

  // 滾動到 output 區
  document.querySelector('.output-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function pad(s, n) {
  s = String(s == null ? '' : s);
  // 中文字佔 2 寬度,簡單估算
  let w = 0;
  for (const ch of s) w += ch.charCodeAt(0) > 127 ? 2 : 1;
  return s + ' '.repeat(Math.max(0, n - w));
}

function row(label, field, value, w) {
  w = w || [4, 8, 60];
  const v = String(value == null ? '' : value);
  return `│ ${pad(label, w[0]*2)} │ ${pad(field, w[1]*2)} │ ${pad(v, w[2]*2)} │`;
}

function lineSep(w, char) {
  w = w || [4, 8, 60];
  char = char || '─';
  return '├' + char.repeat(w[0]*2 + 2) + '┼' + char.repeat(w[1]*2 + 2) + '┼' + char.repeat(w[2]*2 + 2) + '┤';
}

function lineTop(w) {
  w = w || [4, 8, 60];
  return '┌' + '─'.repeat(w[0]*2 + 2) + '┬' + '─'.repeat(w[1]*2 + 2) + '┬' + '─'.repeat(w[2]*2 + 2) + '┐';
}

function lineBottom(w) {
  w = w || [4, 8, 60];
  return '└' + '─'.repeat(w[0]*2 + 2) + '┴' + '─'.repeat(w[1]*2 + 2) + '┴' + '─'.repeat(w[2]*2 + 2) + '┘';
}

// ════════════════════════════════════════════════════
// 新增英雄 → 設計單
// ════════════════════════════════════════════════════
function generateAddOutput() {
  // 檢查必填
  const allMissing = [];
  state.heroes.forEach((h, idx) => {
    const m = getMissingRequired(h);
    if (m.length) allMissing.push({ idx, name: h.name || '未命名', missing: m });
  });
  if (allMissing.length > 0) {
    const lines = allMissing.map(x => `  英雄 ${x.idx+1}「${x.name}」:缺 ${x.missing.join('、')}`);
    if (!confirm(`以下英雄有真正必填的欄位空白:\n\n${lines.join('\n')}\n\n要繼續產生設計單嗎?(我會提示哪些是空白讓 AI 決定)`)) {
      return null;
    }
  }

  const ts = new Date().toLocaleString('zh-TW', { hour12: false });
  let lines = [];
  lines.push('═'.repeat(78));
  lines.push('  LXPSGAME 新英雄設計單(共 ' + state.heroes.length + ' 隻)');
  lines.push('  產生時間:' + ts);
  lines.push('═'.repeat(78));

  // 把空字串/undefined 顯示為標示「🤖 由 AI 決定」
  const ai = (v) => {
    if (v === undefined || v === null || v === '' || (Array.isArray(v) && v.length === 0)) return '🤖 (留空,請 AI 決定)';
    return v;
  };

  state.heroes.forEach((h, idx) => {
    lines.push('');
    lines.push(`【英雄 ${idx+1} / ${state.heroes.length}】${h.name || '🤖 (留空,請 AI 決定)'} ${h.emoji || '🤖'}`);
    lines.push('');
    lines.push(lineTop());
    lines.push(row('區段', '欄位', '值'));
    lines.push(lineSep(undefined, '═'));

    const rows = [
      ['基本', '角色名', h.name || '⚠️ 未填(必填)'],
      ['基本', 'emoji', ai(h.emoji)],
      ['基本', '圖片檔名', h.img || '⚠️ 未填(必填)'],
      ['基本', '班級', h.designerClass || '⚠️ 未填(必填)'],
      ['基本', '姓名', h.designerName || '⚠️ 未填(必填)'],
      ['基本', 'email', h.designerEmail || '⚠️ 未填(必填)'],
      ['基本', '年份', h.designerYear || 2026],
      ['能力', 'HP', h.hp],
      ['能力', '攻擊', h.atk],
      ['能力', '特技', h.sp],
      ['能力', '速度', h.spd],
      ['介紹', '一句話', ai(h.lore)],
      ['介紹', '身分', ai(h.bioRole)],
      ['介紹', '性格', ai(h.bioTrait)],
      ['介紹', '興趣', ai(h.bioHobby)],
      ['介紹', '口頭禪', ai(h.bioQuote)],
      ['天賦', '名稱', ai(h.traitName) + (h.traitIcon ? ' ' + h.traitIcon : '')],
      ['天賦', '短描述', ai(h.traitDesc)],
      ['天賦', '完整描述', ai(h.traitFd)],
      ['天賦', '觸發類型', h.traitTrigger],
      ['天賦', '觸發機率', ai(h.traitChance)],
      ['天賦', '升級', h.traitUpgrade],
      ['S1', '名稱', ai(h.s1Name)],
      ['S1', '能量', h.s1Cost],
      ['S1', '短描述', ai(h.s1D)],
      ['S1', '完整描述', ai(h.s1Fd)],
      ['S1', '效果類型', h.s1EffectType],
      ['S1', '主公式', ai(h.s1Formula)],
      ['S1', '附加狀態', (h.s1Statuses && h.s1Statuses.length) ? (h.s1Statuses.join('、') + (h.s1StatusDur ? ` ${h.s1StatusDur} 回合` : '')) : '🤖 (留空,請 AI 決定)'],
      ['S1', '升級', h.s1Upgrade],
      ['S2', '名稱', ai(h.s2Name)],
      ['S2', '能量', h.s2Cost],
      ['S2', '短描述', ai(h.s2D)],
      ['S2', '完整描述', ai(h.s2Fd)],
      ['S2', '效果類型', h.s2EffectType],
      ['S2', '主公式', ai(h.s2Formula)],
      ['S2', '附加狀態', (h.s2Statuses && h.s2Statuses.length) ? (h.s2Statuses.join('、') + (h.s2StatusDur ? ` ${h.s2StatusDur} 回合` : '')) : '🤖 (留空,請 AI 決定)'],
      ['S2', '升級', h.s2Upgrade],
      ['爆發', '名稱', ai(h.burstName)],
      ['爆發', '短描述', ai(h.burstD)],
      ['爆發', '完整描述', ai(h.burstFd)],
      ['爆發', '主公式', ai(h.burstFormula)],
      ['爆發', '額外效果', (h.burstExtras && h.burstExtras.length) ? h.burstExtras.join('、') : '🤖 (留空,請 AI 決定)'],
      ['爆發', '升級數值表', ai(h.burstUpgradeTable)],
      ['爆發', '動畫來源', h.burstGifSrc],
      ['爆發', '自訂 URL', ai(h.burstGifUrl)],
      ['爆發', '染色 tint', ai(h.burstTint)],
      ['爆發', '持續秒數', ai(h.burstDur)],
      ['爆發', '音效組合', ai(h.burstSfx)],
      ['雷達', '由 AI 決定', h.radarAi ? '✓' : '✗'],
      ['雷達', '攻擊力', h.radarAi ? '🤖 由 AI 決定' : h.radarAtk],
      ['雷達', '速度', h.radarAi ? '🤖 由 AI 決定' : h.radarSpd],
      ['雷達', '防禦力', h.radarAi ? '🤖 由 AI 決定' : h.radarDef],
      ['雷達', '支援力', h.radarAi ? '🤖 由 AI 決定' : h.radarSup],
      ['雷達', '控制力', h.radarAi ? '🤖 由 AI 決定' : h.radarCtrl],
      ['雷達', '技巧性', h.radarAi ? '🤖 由 AI 決定' : h.radarSkill],
      ['圖片', 'AI 決定', h.imgPosAi ? '✓' : '✗'],
      ['圖片', '縮圖位置', h.imgPosAi ? '🤖 由 AI 決定' : ai(h.thumbPos)],
      ['圖片', '縮圖縮放', h.imgPosAi ? '🤖 由 AI 決定' : ai(h.thumbScale)],
      ['圖片', '大圖位置', h.imgPosAi ? '🤖 由 AI 決定' : ai(h.imgPos)],
      ['稀有', '召喚池', h.inSummon ? '✓ 加入稀有英雄池' : '✗ 不加入'],
      ['備註', '自由欄', h.notes || '(無)'],
    ];

    rows.forEach(r => {
      const v = String(r[2] == null ? '' : r[2]);
      if (v.length > 60) {
        const chunks = [];
        let s = v;
        while (s.length > 0) {
          chunks.push(s.slice(0, 60));
          s = s.slice(60);
        }
        chunks.forEach((c, i) => {
          lines.push(row(i === 0 ? r[0] : '', i === 0 ? r[1] : '', c));
        });
      } else {
        lines.push(row(r[0], r[1], v));
      }
    });

    lines.push(lineBottom());

    // 列出哪些欄位是「🤖 留空」的,讓 AI 一眼掃完
    const aiFields = [];
    rows.forEach(r => {
      if (String(r[2]).startsWith('🤖')) aiFields.push(`${r[0]}.${r[1]}`);
    });
    if (aiFields.length > 0) {
      lines.push(`🤖 待 AI 決定的欄位(${aiFields.length} 項):${aiFields.join(' / ')}`);
    }
  });

  // 設計者統計
  const stats = {};
  state.heroes.forEach(h => {
    const key = (h.designerClass || '?') + ' ' + (h.designerName || '?');
    if (!stats[key]) stats[key] = [];
    stats[key].push(h.name || '未命名');
  });
  lines.push('');
  lines.push('═'.repeat(78));
  lines.push('  ✏️ 設計者統計');
  Object.entries(stats).forEach(([who, list]) => {
    lines.push(`  - ${who}:${list.length} 隻(${list.join('、')})`);
  });
  lines.push('═'.repeat(78));

  return lines.join('\n');
}

// ════════════════════════════════════════════════════
// 修改現有英雄 → 平衡調整單(只列出有改的部分)
// ════════════════════════════════════════════════════
function generateEditOutput() {
  const ts = new Date().toLocaleString('zh-TW', { hour12: false });
  let lines = [];

  // 篩出有改動的英雄
  const changed = state.heroes.filter(h => modifiedCount(h) > 0);
  if (changed.length === 0) {
    showToast('沒有任何欄位被改動,無需產生平衡調整單', 'danger');
    return null;
  }

  lines.push('═'.repeat(78));
  lines.push('  LXPSGAME 平衡調整單(共 ' + changed.length + ' 隻有變動)');
  lines.push('  產生時間:' + ts);
  lines.push('═'.repeat(78));

  changed.forEach((h, idx) => {
    const orig = HEROES_DB[h.sourceName];
    if (!orig) return;

    lines.push('');
    lines.push(`【${idx+1}/${changed.length}】${h.sourceName} ${h.emoji || orig.emoji || ''}`);
    lines.push('');

    const w = [4, 8, 28, 28];
    const sep = '├' + '─'.repeat(w[0]*2+2) + '┼' + '─'.repeat(w[1]*2+2) + '┼' + '─'.repeat(w[2]*2+2) + '┼' + '─'.repeat(w[3]*2+2) + '┤';
    const top = '┌' + '─'.repeat(w[0]*2+2) + '┬' + '─'.repeat(w[1]*2+2) + '┬' + '─'.repeat(w[2]*2+2) + '┬' + '─'.repeat(w[3]*2+2) + '┐';
    const bot = '└' + '─'.repeat(w[0]*2+2) + '┴' + '─'.repeat(w[1]*2+2) + '┴' + '─'.repeat(w[2]*2+2) + '┴' + '─'.repeat(w[3]*2+2) + '┘';
    const headerSep = '╞' + '═'.repeat(w[0]*2+2) + '╪' + '═'.repeat(w[1]*2+2) + '╪' + '═'.repeat(w[2]*2+2) + '╪' + '═'.repeat(w[3]*2+2) + '╡';

    lines.push(top);
    lines.push(`│ ${pad('區段', w[0]*2)} │ ${pad('欄位', w[1]*2)} │ ${pad('原本', w[2]*2)} │ ${pad('修改為', w[3]*2)} │`);
    lines.push(headerSep);

    // 列出有改的欄位
    const compareList = [
      ['能力', 'HP', orig.hp, h.hp],
      ['能力', '攻擊', orig.atk, h.atk],
      ['能力', '特技', orig.sp, h.sp],
      ['能力', '速度', orig.spd, h.spd],
      ['介紹', '一句話', orig.lore || '', h.lore],
      ['介紹', '身分', orig.bio?.role || '', h.bioRole],
      ['介紹', '性格', orig.bio?.trait || '', h.bioTrait],
      ['介紹', '興趣', orig.bio?.hobby || '', h.bioHobby],
      ['介紹', '口頭禪', orig.bio?.quote || '', h.bioQuote],
      ['天賦', '名稱', orig.trait?.name || '', h.traitName],
      ['天賦', '短描述', orig.trait?.desc || '', h.traitDesc],
      ['天賦', '完整描述', orig.trait?.fd || '', h.traitFd],
      ['S1', '名稱', orig.s1?.n || '', h.s1Name],
      ['S1', '能量', orig.s1?.c, h.s1Cost],
      ['S1', '短描述', orig.s1?.d || '', h.s1D],
      ['S1', '完整描述', orig.s1?.fd || '', h.s1Fd],
      ['S2', '名稱', orig.s2?.n || '', h.s2Name],
      ['S2', '能量', orig.s2?.c, h.s2Cost],
      ['S2', '短描述', orig.s2?.d || '', h.s2D],
      ['S2', '完整描述', orig.s2?.fd || '', h.s2Fd],
      ['爆發', '名稱', orig.burst?.n || '', h.burstName],
      ['爆發', '短描述', orig.burst?.d || '', h.burstD],
      ['爆發', '完整描述', orig.burst?.fd || '', h.burstFd],
    ];

    let rowCount = 0;
    compareList.forEach(([sec, fld, oldV, newV]) => {
      const o = String(oldV == null ? '' : oldV);
      const n = String(newV == null ? '' : newV);
      if (o === n) return;
      // 短文字直接顯示;長文字截斷
      const oShort = o.length > 28 ? o.slice(0, 25) + '...' : o;
      const nShort = n.length > 28 ? n.slice(0, 25) + '...' : n;
      // 數字加箭頭
      let nDisp = nShort;
      if (typeof oldV === 'number' && typeof newV === 'number' && oldV !== newV) {
        const arrow = newV > oldV ? '↑' : '↓';
        const diff = (newV > oldV ? '+' : '') + (newV - oldV);
        nDisp = newV + ' ' + arrow + diff;
      }
      lines.push(`│ ${pad(sec, w[0]*2)} │ ${pad(fld, w[1]*2)} │ ${pad(oShort, w[2]*2)} │ ${pad(nDisp, w[3]*2)} │`);
      // 若被截斷,完整內容附在下方
      if (o.length > 28) lines.push(`│ ${pad('', w[0]*2)} │ ${pad('完整原文', w[1]*2)} │ ${pad(o.slice(0, w[2]*2 + w[3]*2 + 3), (w[2]+w[3])*2 + 3)} │`);
      if (n.length > 28) lines.push(`│ ${pad('', w[0]*2)} │ ${pad('完整新值', w[1]*2)} │ ${pad(n.slice(0, w[2]*2 + w[3]*2 + 3), (w[2]+w[3])*2 + 3)} │`);
      rowCount++;
    });

    if (rowCount === 0) {
      lines.push(`│ ${pad('(無', w[0]*2)} │ ${pad('變動)', w[1]*2)} │ ${pad('', w[2]*2)} │ ${pad('', w[3]*2)} │`);
    }

    lines.push(bot);
    lines.push(`(共改動 ${rowCount} 個欄位)`);
  });

  lines.push('');
  lines.push('═'.repeat(78));
  lines.push('  ⚖ 平衡調整摘要');
  lines.push(`  - 影響英雄數:${changed.length} 隻`);
  lines.push(`  - 總改動欄位:${changed.reduce((s, h) => s + modifiedCount(h), 0)} 處`);
  lines.push(`  - 提交後我會檢視並升 1 個版本(末四碼 +10),寫進 GAME_CHANGELOG`);
  lines.push('═'.repeat(78));

  return lines.join('\n');
}

// ════════════════════════════════════════════════════
// 複製到剪貼簿
// ════════════════════════════════════════════════════
function copyOutput() {
  const pre = document.querySelector('.output-pre');
  if (!pre) return;
  const text = pre.textContent;
  // 嘗試 modern API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => showToast('✓ 已複製到剪貼簿,貼給 AI 即可', 'success'),
      () => fallbackCopy(text)
    );
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('✓ 已複製到剪貼簿', 'success');
  } catch(e) {
    showToast('複製失敗,請手動選取後複製', 'danger');
  }
  document.body.removeChild(ta);
}
